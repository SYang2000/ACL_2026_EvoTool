<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" width="1200" height="520" role="img"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <title>EvoTool overview: a modular tool-use pipeline (Planner, Selector, Caller, Synthesizer) improved by a self-evolving loop of blame attribution, targeted mutation, and diversity-aware selection.</title>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8.5" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,1 L9,5 L0,9 Z" fill="#475569"/>
    </marker>
    <marker id="arrv" markerWidth="10" markerHeight="10" refX="8.5" refY="5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,1 L9,5 L0,9 Z" fill="#7c3aed"/>
    </marker>
  </defs>

  <!-- ===================== Policy container ===================== -->
  <rect x="160" y="36" width="860" height="130" rx="16" fill="#fbfaff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="176" y="60" font-size="12.5" fill="#64748b" font-weight="600">Tool-use policy &#920; &#8212; four evolvable module prompts (LLM weights frozen)</text>

  <!-- Query pill -->
  <rect x="20" y="82" width="110" height="52" rx="26" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5"/>
  <text x="75" y="113" font-size="14" fill="#1e293b" text-anchor="middle" font-weight="600">User query</text>

  <!-- Planner -->
  <rect x="180" y="76" width="160" height="64" rx="12" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="260" y="101" font-size="15" fill="#1e293b" text-anchor="middle" font-weight="700">Planner</text>
  <text x="260" y="121" font-size="12" fill="#475569" text-anchor="middle">&#952;<tspan font-size="9.5" dy="2">plan</tspan><tspan dy="-2"> &#183; decompose the task</tspan></text>

  <!-- Selector (blamed + edited in this illustration) -->
  <rect x="392" y="68" width="176" height="80" rx="16" fill="none" stroke="#7c3aed" stroke-width="2" stroke-dasharray="6 5"/>
  <rect x="400" y="76" width="160" height="64" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="480" y="101" font-size="15" fill="#1e293b" text-anchor="middle" font-weight="700">Selector</text>
  <text x="480" y="121" font-size="12" fill="#475569" text-anchor="middle">&#952;<tspan font-size="9.5" dy="2">sel</tspan><tspan dy="-2"> &#183; choose the tool</tspan></text>

  <!-- Caller -->
  <rect x="620" y="76" width="160" height="64" rx="12" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="700" y="101" font-size="15" fill="#1e293b" text-anchor="middle" font-weight="700">Caller</text>
  <text x="700" y="121" font-size="12" fill="#475569" text-anchor="middle">&#952;<tspan font-size="9.5" dy="2">call</tspan><tspan dy="-2"> &#183; fill the arguments</tspan></text>

  <!-- Synthesizer -->
  <rect x="840" y="76" width="160" height="64" rx="12" fill="#fae8ff" stroke="#a21caf" stroke-width="1.5"/>
  <text x="920" y="101" font-size="15" fill="#1e293b" text-anchor="middle" font-weight="700">Synthesizer</text>
  <text x="920" y="121" font-size="12" fill="#475569" text-anchor="middle">&#952;<tspan font-size="9.5" dy="2">syn</tspan><tspan dy="-2"> &#183; compose the answer</tspan></text>

  <!-- Answer pill -->
  <rect x="1060" y="82" width="120" height="52" rx="26" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/>
  <text x="1120" y="113" font-size="14" fill="#1e293b" text-anchor="middle" font-weight="600">Answer</text>

  <!-- Pipeline arrows -->
  <line x1="130" y1="108" x2="174" y2="108" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="340" y1="108" x2="394" y2="108" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="560" y1="108" x2="614" y2="108" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="780" y1="108" x2="834" y2="108" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="1000" y1="108" x2="1054" y2="108" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Tool execution (environment) -->
  <rect x="620" y="210" width="160" height="52" rx="12" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="700" y="232" font-size="13.5" fill="#334155" text-anchor="middle" font-weight="600">Tool execution</text>
  <text x="700" y="249" font-size="12" fill="#64748b" text-anchor="middle">environment</text>
  <line x1="688" y1="144" x2="688" y2="205" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <text x="680" y="182" font-size="12" fill="#64748b" text-anchor="end">execute</text>
  <path d="M 782,236 C 858,232 900,196 912,150" fill="none" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <text x="876" y="256" font-size="12" fill="#64748b" text-anchor="middle">observations</text>

  <!-- ===================== Evolution loop (right to left) ===================== -->

  <!-- rollout down -->
  <line x1="1120" y1="134" x2="1120" y2="325" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <text x="1130" y="238" font-size="12" fill="#64748b">rollout</text>

  <!-- Trajectory -->
  <rect x="990" y="330" width="170" height="68" rx="12" fill="#f1f5f9" stroke="#64748b" stroke-width="1.5"/>
  <text x="1075" y="357" font-size="14.5" fill="#1e293b" text-anchor="middle" font-weight="700">Trajectory &#964;</text>
  <text x="1075" y="377" font-size="12" fill="#475569" text-anchor="middle">full rollout + reward r</text>

  <line x1="990" y1="364" x2="944" y2="364" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Blamer -->
  <rect x="740" y="330" width="200" height="68" rx="12" fill="#e0e7ff" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="840" y="357" font-size="14" fill="#1e293b" text-anchor="middle" font-weight="700">&#9312; Blame Attribution</text>
  <text x="840" y="377" font-size="12" fill="#475569" text-anchor="middle">localize the faulty module &#960;*</text>

  <line x1="740" y1="364" x2="694" y2="364" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Mutator -->
  <rect x="490" y="330" width="200" height="68" rx="12" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="590" y="357" font-size="14" fill="#1e293b" text-anchor="middle" font-weight="700">&#9313; Targeted Mutation</text>
  <text x="590" y="377" font-size="12" fill="#475569" text-anchor="middle">edit only &#952;<tspan font-size="9.5" dy="2">&#960;*</tspan><tspan dy="-2"> via feedback F</tspan></text>

  <line x1="490" y1="364" x2="454" y2="364" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Child policy -->
  <rect x="340" y="330" width="110" height="68" rx="12" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="395" y="357" font-size="14" fill="#1e293b" text-anchor="middle" font-weight="700">Child &#920;&#8242;</text>
  <text x="395" y="377" font-size="12" fill="#475569" text-anchor="middle">one-module edit</text>

  <line x1="340" y1="364" x2="294" y2="364" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Diversity-aware selection -->
  <rect x="60" y="330" width="230" height="68" rx="12" fill="#fce7f3" stroke="#db2777" stroke-width="1.5"/>
  <text x="175" y="357" font-size="14" fill="#1e293b" text-anchor="middle" font-weight="700">&#9314; Diversity-Aware Selection</text>
  <text x="175" y="377" font-size="12" fill="#475569" text-anchor="middle">keep complementary winners on S<tspan font-size="9.5" dy="2">sel</tspan></text>

  <!-- loop back up to the policy row -->
  <line x1="175" y1="330" x2="175" y2="172" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <text x="186" y="245" font-size="12" fill="#64748b">next parent &#920;<tspan font-size="9.5" dy="2">p</tspan></text>
  <text x="186" y="262" font-size="12" fill="#64748b">sampled from population</text>

  <!-- targeted edit arrow: mutator edits exactly ONE module -->
  <path d="M 590,330 C 590,240 484,232 484,156" fill="none" stroke="#7c3aed" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#arrv)"/>
  <text x="474" y="248" font-size="12.5" fill="#7c3aed" text-anchor="end" font-style="italic">edits exactly one module</text>

  <!-- caption -->
  <text x="600" y="442" font-size="12.5" fill="#475569" text-anchor="middle">Self-evolving loop: blame &#8594; targeted mutation &#8594; diversity-aware selection, repeated over generations &#8212; no gradient updates.</text>

  <!-- legend -->
  <rect x="150" y="469" width="18" height="12" rx="3" fill="#dbeafe" stroke="#2563eb" stroke-width="1.2"/>
  <text x="174" y="479" font-size="12.5" fill="#475569">evolvable module prompt</text>
  <rect x="420" y="469" width="18" height="12" rx="3" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="3 3"/>
  <text x="444" y="479" font-size="12.5" fill="#475569">environment (not evolved)</text>
  <line x1="690" y1="475" x2="718" y2="475" stroke="#7c3aed" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#arrv)"/>
  <text x="730" y="479" font-size="12.5" fill="#475569">targeted mutation &#8212; one module per generation</text>
</svg>
